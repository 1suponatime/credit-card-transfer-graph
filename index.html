    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Tooltip */
    #tooltip {
      position: fixed; display: none;
      padding: 10px 16px; background: rgba(15,15,35,0.95);

    #tooltip .tt-src { font-size: 10px; color: #60a5fa; margin-top: 8px; display: block; text-decoration: none; }
    #tooltip .tt-src:hover { text-decoration: underline; }

    /* Info panel — bottom-right */
    #info-panel {

    /* Controls — bottom-left */
    #controls-hint {
      position: fixed; bottom: 60px; left: 16px;

      backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05);

  <script type="module">
    import * as THREE from 'three';

    // ═══════════════════════════════════════════════════

    const ALLIANCES = {

    const CARD_PROGRAMS = [

    const PRIMARY_REF = 'https://www.uscreditcardguide.com/wings-of-the-points/';

    const AIRLINES = [
      { id:'AC', name:'Air Canada (Aeroplan)',      code:'AC', alliance:'Star Alliance' },
      { id:'NH', name:'ANA (全日空)',                code:'NH', alliance:'Star Alliance' },
      { id:'OZ', name:'Asiana Airlines',            code:'OZ', alliance:'Star Alliance' },
      { id:'AV', name:'Avianca (LifeMiles)',        code:'AV', alliance:'Star Alliance' },
      { id:'BR', name:'EVA Air (长荣)',              code:'BR', alliance:'Star Alliance' },
      { id:'LH', name:'Lufthansa (M&M)',            code:'LH', alliance:'Star Alliance' },
      { id:'SQ', name:'Singapore (新航)',            code:'SQ', alliance:'Star Alliance' },
      { id:'TK', name:'Turkish (土航)',              code:'TK', alliance:'Star Alliance' },
      { id:'UA', name:'United (美联航)',              code:'UA', alliance:'Star Alliance' },
      { id:'AA', name:'American (AA)',               code:'AA', alliance:'oneworld' },
      { id:'BA', name:'British Airways',             code:'BA', alliance:'oneworld' },
      { id:'CX', name:'Cathay Pacific (国泰)',       code:'CX', alliance:'oneworld' },
      { id:'IB', name:'Iberia',                      code:'IB', alliance:'oneworld' },
      { id:'JL', name:'Japan Airlines (日航)',        code:'JL', alliance:'oneworld' },
      { id:'MH', name:'Malaysia (马航)',              code:'MH', alliance:'oneworld' },
      { id:'QF', name:'Qantas (澳航)',               code:'QF', alliance:'oneworld' },
      { id:'QR', name:'Qatar (卡航)',                 code:'QR', alliance:'oneworld' },
      { id:'AM', name:'Aeromexico',                  code:'AM', alliance:'SkyTeam' },
      { id:'AF', name:'Air France/KLM (FB)',         code:'AF', alliance:'SkyTeam' },
      { id:'DL', name:'Delta (达美)',                 code:'DL', alliance:'SkyTeam' },
      { id:'KE', name:'Korean Air (大韩)',            code:'KE', alliance:'SkyTeam' },
      { id:'VS', name:'Virgin Atlantic',             code:'VS', alliance:'SkyTeam' },
      { id:'EK', name:'Emirates (阿联酋)',            code:'EK', alliance:'Independent' },
      { id:'EY', name:'Etihad',                      code:'EY', alliance:'Independent' },
      { id:'HA', name:'Hawaiian',                    code:'HA', alliance:'Independent' },
      { id:'B6', name:'JetBlue',                     code:'B6', alliance:'Independent' },
      { id:'WN', name:'Southwest (西南)',             code:'WN', alliance:'Independent' },
    ];

    const AIRLINE_TRANSFERS = [
      ['UR','AC',1],['UR','BA',1],['UR','AF',1],['UR','IB',1],['UR','SQ',1],['UR','UA',1],['UR','VS',1],['UR','B6',1],['UR','WN',1],['UR','BR',1],['UR','EK',1],
      ['MR','AC',1],['MR','NH',0.5],['MR','AV',1],['MR','BA',1],['MR','CX',0.8],['MR','DL',1],['MR','EK',1],['MR','EY',1],['MR','AF',1],['MR','HA',1],['MR','IB',1],['MR','SQ',1],['MR','VS',1],['MR','QF',1],['MR','B6',0.8],
      ['TYP','AC',1],['TYP','AV',1],['TYP','CX',1],['TYP','EK',1],['TYP','EY',1],['TYP','BR',1],['TYP','AF',1],['TYP','B6',1],['TYP','MH',1],['TYP','QF',1],['TYP','QR',1],['TYP','SQ',1],['TYP','TK',1],['TYP','VS',1],
      ['C1','AC',1],['C1','AV',1],['C1','BA',1],['C1','CX',1],['C1','EK',1],['C1','EY',1],['C1','BR',1],['C1','AF',1],['C1','IB',1],['C1','JL',0.75],['C1','QR',1],['C1','SQ',1],['C1','TK',1],['C1','VS',1],
      ['Bilt','AA',1],['Bilt','AC',1],['Bilt','AF',1],['Bilt','BA',1],['Bilt','CX',1],['Bilt','EK',1],['Bilt','IB',1],['Bilt','TK',1],['Bilt','UA',1],['Bilt','VS',1],['Bilt','QR',1],
      ['MB','AA',0.42],['MB','AC',0.42],['MB','NH',0.42],['MB','AV',0.42],['MB','BA',0.42],['MB','CX',0.42],['MB','DL',0.42],['MB','EK',0.42],['MB','EY',0.42],['MB','AF',0.42],['MB','HA',0.42],['MB','IB',0.42],['MB','JL',0.42],['MB','KE',0.42],['MB','LH',0.42],['MB','MH',0.42],['MB','QF',0.42],['MB','QR',0.42],['MB','SQ',0.42],['MB','TK',0.42],['MB','UA',0.37],['MB','VS',0.42],
    ];

    const HOTELS = [
      { id:'HY', name:'World of Hyatt (凯悦)',       code:'HY', alliance:'Luxury' },
      { id:'MB_H', name:'Marriott Bonvoy (万豪)',    code:'MB', alliance:'Luxury' },
      { id:'HH', name:'Hilton Honors (希尔顿)',      code:'HH', alliance:'Mid-Scale' },
      { id:'IHG', name:'IHG One Rewards (洲际)',     code:'IHG', alliance:'Mid-Scale' },
      { id:'WY', name:'Wyndham Rewards (温德姆)',     code:'WY', alliance:'Economy' },
      { id:'CH', name:'Choice Privileges',           code:'CH', alliance:'Economy' },
      { id:'AL', name:'Accor Live Limitless (雅高)',  code:'AL', alliance:'Luxury' },
    ];

    const HOTEL_TRANSFERS = [
      // Chase UR
      ['UR','HY',1], ['UR','IHG',1], ['UR','MB_H',1], ['UR','WY',1],
      // Amex MR
      ['MR','HH',2], ['MR','MB_H',1], ['MR','CH',1],
      // Citi TYP
      ['TYP','WY',1], ['TYP','CH',1], ['TYP','AL',0.5],
      // Capital One
      ['C1','WY',1], ['C1','CH',1], ['C1','AL',0.5],
      // Bilt
      ['Bilt','HY',1], ['Bilt','HH',1], ['Bilt','IHG',1], ['Bilt','MB_H',1], ['Bilt','AL',0.67],
      // Marriott Bonvoy — is itself a hotel program, no transfer needed
    ];

    function dedup(transfers) {
      const out = [], seen = new Set();
      for (const t of transfers) {
        const k = `${t[0]}-${t[1]}`;
        if (!seen.has(k)) { seen.add(k); out.push(t); }
      }
      return out;
    }

    // ═══════════════════════════════════════════════════
    //  THREE.JS SETUP
    // ═══════════════════════════════════════════════════

    const container = document.getElementById('canvas-container');
    let W = window.innerWidth, H = window.innerHeight;
    const isMobile = () => W < 640;
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, -1000, 1000);
    camera.position.z = 100;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Groups
    const nodeGroup = new THREE.Group();
    const edgeGroup = new THREE.Group();
    const labelGroup = new THREE.Group();
    scene.add(edgeGroup); scene.add(nodeGroup); scene.add(labelGroup);

    // State
    let currentMode = 'airlines';
    let nodeMeshes = {}, nodeData = {}, labelSprites = {}, glowMeshes = {};
    let edgeMeshes = [], edgeDataMap = [];
    let nodePositions = {};
    let particleSystem = null, particleGeo = null, particleMat = null;
    let particlePositions, particleProgress, particleSpeeds, particleEdgeIndex, particleCount;
    let currentTransfers = [];
    let hoveredNode = null, lockedNode = null, selectedAlliance = null;
    let panOffset = { x: 0, y: 0 }, zoomLevel = 1, isPanning = false, panStart = { x: 0, y: 0 };
    const mouse = new THREE.Vector2();
    const raycaster = new THREE.Raycaster();
    const tooltip = document.getElementById('tooltip');

    // ═══════════════════════════════════════════════════
    //  RENDER HELPERS
    // ═══════════════════════════════════════════════════

    function createTextTexture(text, fontSize, color, fontWeight = '500') {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.font = `${fontWeight} ${fontSize}px Inter, sans-serif`;
      const w = ctx.measureText(text).width + 8;
      const h = fontSize * 1.4;
      canvas.width = w * 2; canvas.height = h * 2;
      ctx.scale(2, 2);
      ctx.font = `${fontWeight} ${fontSize}px Inter, sans-serif`;
      ctx.fillStyle = color;
      ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
      ctx.fillText(text, w/2, h/2);
      const tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      return { texture: tex, width: w, height: h };
    }

    function clearScene() {
      // Remove all objects from groups
      while (nodeGroup.children.length) nodeGroup.remove(nodeGroup.children[0]);
      while (edgeGroup.children.length) edgeGroup.remove(edgeGroup.children[0]);
      while (labelGroup.children.length) labelGroup.remove(labelGroup.children[0]);
      if (particleSystem) { scene.remove(particleSystem); particleSystem = null; }
      nodeMeshes = {}; nodeData = {}; labelSprites = {}; glowMeshes = {};
      edgeMeshes = []; edgeDataMap = [];
      nodePositions = {};
      hoveredNode = null; lockedNode = null; selectedAlliance = null;
      tooltip.style.display = 'none';
    }

    // ═══════════════════════════════════════════════════
    //  BUILD GRAPH
    // ═══════════════════════════════════════════════════

    function buildGraph(mode) {
      clearScene();
      currentMode = mode;

      const isAirlines = mode === 'airlines';
      const destinations = isAirlines ? AIRLINES : HOTELS;
      const groups = isAirlines ? ALLIANCES : HOTEL_CHAINS;
      const groupKey = 'alliance';
      const groupOrder = isAirlines
        ? ['Star Alliance','oneworld','SkyTeam','Independent']
        : ['Luxury','Mid-Scale','Economy'];
      const rawTransfers = isAirlines ? AIRLINE_TRANSFERS : HOTEL_TRANSFERS;

      // For hotel mode, exclude Marriott from card programs (it IS a hotel program)
      const cards = isAirlines ? CARD_PROGRAMS : CARD_PROGRAMS.filter(c => c.id !== 'MB');
      currentTransfers = dedup(rawTransfers);

      // Layout — responsive
      const mobile = isMobile();
      const CARD_X = -W * (mobile ? 0.22 : 0.18);
      const DEST_X = W * (mobile ? 0.22 : 0.18);
      const cardSpacing = Math.min(mobile ? 55 : 80, (H - (mobile ? 140 : 200)) / Math.max(1, cards.length - 1));
      const cardStartY = (cards.length - 1) * cardSpacing / 2;

      // Position cards
      cards.forEach((c, i) => {
        nodePositions[c.id] = { x: CARD_X, y: cardStartY - i * cardSpacing };
      });

      // Sort destinations by group
      const sorted = [...destinations].sort((a, b) => {
        const ao = groupOrder.indexOf(a[groupKey]) - groupOrder.indexOf(b[groupKey]);
        return ao !== 0 ? ao : a.code.localeCompare(b.code);
      });

      const maxDest = isAirlines ? (mobile ? 28 : 36) : (mobile ? 45 : 60);
      const destSpacing = Math.min(maxDest, (H - (mobile ? 80 : 120)) / Math.max(1, sorted.length - 1));
      const destStartY = (sorted.length - 1) * destSpacing / 2;
      sorted.forEach((d, i) => {
        nodePositions[d.id] = { x: DEST_X, y: destStartY - i * destSpacing };
      });

      // --- Card nodes ---
      const cardR = mobile ? 14 : 20;
      const cardGlowR = mobile ? 22 : 32;
      const cardFontSize = mobile ? 10 : 13;
      cards.forEach(card => {
        const pos = nodePositions[card.id];
        const geo = new THREE.CircleGeometry(cardR, 32);
        const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color(card.color), transparent: true, opacity: 0.9 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(pos.x, pos.y, 1);
        nodeGroup.add(mesh);
        nodeMeshes[card.id] = mesh;
        nodeData[card.id] = { type: 'card', data: card };

        const glowGeo = new THREE.CircleGeometry(cardGlowR, 32);
        const glowMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(card.color), transparent: true, opacity: 0.12 });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        glow.position.set(pos.x, pos.y, 0);
        nodeGroup.add(glow);
        glowMeshes[card.id] = glow;

        const { texture, width, height } = createTextTexture(card.name, cardFontSize, '#ffffff', '700');
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false }));
        sprite.scale.set(width, height, 1);
        sprite.position.set(pos.x - cardR - 8 - width/2, pos.y, 2);
        nodeGroup.add(sprite);
        labelSprites[card.id] = sprite;
      });

      // --- Destination nodes ---
      const destR = mobile ? (isAirlines ? 7 : 10) : (isAirlines ? 10 : 14);
      const destFontSize = mobile ? 8 : 11;
      let lastGroup = null;
      sorted.forEach(dest => {
        const groupColor = groups[dest[groupKey]].color;
        const pos = nodePositions[dest.id];

        const geo = new THREE.CircleGeometry(destR, 24);
        const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color(groupColor), transparent: true, opacity: 0.85 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(pos.x, pos.y, 1);
        nodeGroup.add(mesh);
        nodeMeshes[dest.id] = mesh;
        nodeData[dest.id] = { type: 'dest', data: dest };

        const glowGeo = new THREE.CircleGeometry(destR + (mobile ? 4 : 6), 24);
        const glowMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(groupColor), transparent: true, opacity: 0.08 });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        glow.position.set(pos.x, pos.y, 0);
        nodeGroup.add(glow);
        glowMeshes[dest.id] = glow;

        const labelText = mobile ? dest.code : `${dest.code}  ${dest.name}`;
        const { texture, width, height } = createTextTexture(labelText, destFontSize, mobile ? '#ffffff' : '#dddddd', '500');
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false }));
        sprite.scale.set(width, height, 1);
        sprite.position.set(pos.x + destR + 4 + width/2, pos.y, 2);
        nodeGroup.add(sprite);
        labelSprites[dest.id] = sprite;

        // Group label
        if (dest[groupKey] !== lastGroup) {
          const gi = groups[dest[groupKey]];
          const glabelSize = mobile ? 7 : 10;
          const { texture: gt, width: gw, height: gh } = createTextTexture(dest[groupKey], glabelSize, gi.color, '600');
          const gs = new THREE.Sprite(new THREE.SpriteMaterial({ map: gt, transparent: true, opacity: 0.6, depthTest: false }));
          gs.scale.set(gw, gh, 1);
          gs.position.set(DEST_X - 30 - gw/2, pos.y + destSpacing * 0.65, 2);
          labelGroup.add(gs);
          lastGroup = dest[groupKey];
        }
      });

      // --- Edges ---
      currentTransfers.forEach(([fromId, toId, ratio]) => {
        const from = nodePositions[fromId];
        const to = nodePositions[toId];
        if (!from || !to) return;
        const card = cards.find(c => c.id === fromId);
        const color = card ? card.color : '#666';
        const midX = (from.x + to.x) / 2;
        const curve = new THREE.QuadraticBezierCurve3(
          new THREE.Vector3(from.x, from.y, 0),
          new THREE.Vector3(midX, (from.y + to.y) / 2, 0),
          new THREE.Vector3(to.x, to.y, 0)
        );
        const geometry = new THREE.BufferGeometry().setFromPoints(curve.getPoints(48));
        const material = new THREE.LineBasicMaterial({ color: new THREE.Color(color), transparent: true, opacity: 0.08 });
        const line = new THREE.Line(geometry, material);
        edgeGroup.add(line);
        edgeMeshes.push(line);
        edgeDataMap.push({ from: fromId, to: toId, ratio, color });
      });

      // --- Particles ---
      particleCount = currentTransfers.length * 2;
      particleGeo = new THREE.BufferGeometry();
      particlePositions = new Float32Array(particleCount * 3);
      const pColors = new Float32Array(particleCount * 3);
      particleProgress = new Float32Array(particleCount);
      particleSpeeds = new Float32Array(particleCount);
      particleEdgeIndex = new Int32Array(particleCount);

      for (let i = 0; i < particleCount; i++) {
        const ei = i % currentTransfers.length;
        particleEdgeIndex[i] = ei;
        particleProgress[i] = Math.random();
        particleSpeeds[i] = 0.001 + Math.random() * 0.002;
        const card = cards.find(c => c.id === currentTransfers[ei][0]);
        const c = new THREE.Color(card ? card.color : '#fff');
        pColors[i*3] = c.r; pColors[i*3+1] = c.g; pColors[i*3+2] = c.b;
      }
      particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
      particleGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));
      particleMat = new THREE.PointsMaterial({ size: 3, vertexColors: true, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, depthTest: false });
      particleSystem = new THREE.Points(particleGeo, particleMat);
      scene.add(particleSystem);

      // --- Update UI ---
      document.getElementById('stat-cards').textContent = cards.length;
      document.getElementById('stat-dest-label').textContent = isAirlines ? '航空公司' : '酒店';
      document.getElementById('stat-dest').textContent = sorted.length;
      document.getElementById('stat-edges').textContent = currentTransfers.length;
      document.getElementById('stat-group-label').textContent = isAirlines ? '联盟' : '酒店集团';
      document.getElementById('stat-groups').textContent = Object.keys(groups).length;

      // --- Rebuild legend ---
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      cards.forEach(c => {
        legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div>${c.name}</div>`;
      });
      legend.innerHTML += `<div style="width:1px;height:14px;background:rgba(255,255,255,0.1);margin:0 2px"></div>`;
      Object.entries(groups).forEach(([name, info]) => {
        legend.innerHTML += `<div class="legend-item clickable" data-alliance="${name}"><div class="legend-dot" style="background:${info.color}"></div>${name}</div>`;
      });

      // Bind alliance/chain click
      document.querySelectorAll('.legend-item.clickable').forEach(el => {
        el.addEventListener('click', () => {
          const g = el.dataset.alliance;
          if (selectedAlliance === g) { clearAllSelection(); }
          else {
            lockedNode = null; tooltip.style.display = 'none';
            selectedAlliance = g;
            document.querySelectorAll('.legend-item.clickable').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            highlightGroup(g);
          }
        });
      });
    }

    // ═══════════════════════════════════════════════════
    //  INTERACTION
    // ═══════════════════════════════════════════════════

    function getConnectedEdges(nodeId) {
      return currentTransfers.map((t, i) => ({ from: t[0], to: t[1], ratio: t[2], index: i }))
        .filter(e => e.from === nodeId || e.to === nodeId);
    }

    function highlightNode(nodeId) {
      const connected = getConnectedEdges(nodeId);
      const ids = new Set([nodeId]);
      connected.forEach(e => { ids.add(e.from); ids.add(e.to); });

      edgeMeshes.forEach((line, i) => {
        const ed = edgeDataMap[i];
        line.material.opacity = (ed.from === nodeId || ed.to === nodeId) ? 0.5 : 0.015;
      });
      Object.entries(nodeMeshes).forEach(([id, mesh]) => {
        const hit = ids.has(id);
        mesh.material.opacity = hit ? 1.0 : 0.15;
        if (labelSprites[id]) labelSprites[id].material.opacity = hit ? 1.0 : 0.2;
        if (glowMeshes[id]) glowMeshes[id].material.opacity = hit ? 0.25 : 0.02;
      });
    }

    function highlightGroup(groupName) {
      const destKey = currentMode === 'airlines' ? AIRLINES : HOTELS;
      const memberIds = destKey.filter(d => d.alliance === groupName).map(d => d.id);
      const memberSet = new Set(memberIds);
      const connected = currentTransfers.map((t, i) => ({ from: t[0], to: t[1], index: i }))
        .filter(e => memberSet.has(e.to));
      const ids = new Set(memberIds);
      connected.forEach(e => { ids.add(e.from); ids.add(e.to); });
      const edgeSet = new Set(connected.map(e => e.index));

      edgeMeshes.forEach((line, i) => { line.material.opacity = edgeSet.has(i) ? 0.4 : 0.012; });
      Object.entries(nodeMeshes).forEach(([id, mesh]) => {
        const hit = ids.has(id);
        mesh.material.opacity = hit ? 1.0 : 0.1;
        if (labelSprites[id]) labelSprites[id].material.opacity = hit ? 1.0 : 0.15;
        if (glowMeshes[id]) glowMeshes[id].material.opacity = hit ? 0.2 : 0.01;
      });
    }

    function resetHighlight() {
      edgeMeshes.forEach((line, i) => { line.material.opacity = 0.08; });
      Object.entries(nodeMeshes).forEach(([id, mesh]) => {
        const nd = nodeData[id];
        mesh.material.opacity = nd?.type === 'card' ? 0.9 : 0.85;
        if (labelSprites[id]) labelSprites[id].material.opacity = 1.0;
        if (glowMeshes[id]) glowMeshes[id].material.opacity = nd?.type === 'card' ? 0.12 : 0.08;
      });
      if (particleMat) particleMat.opacity = 0.6;
    }

    function clearAllSelection() {
      selectedAlliance = null; lockedNode = null; hoveredNode = null;
      document.querySelectorAll('.legend-item.clickable').forEach(e => e.classList.remove('active'));
      resetHighlight(); tooltip.style.display = 'none';
    }

    function showTooltip(nodeId, sx, sy) {
      const nd = nodeData[nodeId];
      if (!nd) return;
      const connected = getConnectedEdges(nodeId);
      let html = '';

      if (nd.type === 'card') {
        html += `<div class="tt-title" style="color:${nd.data.color}">${nd.data.fullName}</div>`;
        html += `<div class="tt-sub">转点至 ${connected.length} 个${currentMode === 'airlines' ? '航空公司' : '酒店'}</div>`;
        html += `<div class="tt-partners">`;
        connected.forEach(e => {
          const dest = (currentMode === 'airlines' ? AIRLINES : HOTELS).find(d => d.id === e.to);
          if (!dest) return;
          const groups = currentMode === 'airlines' ? ALLIANCES : HOTEL_CHAINS;
          const gc = groups[dest.alliance]?.color || '#888';
          const ratioStr = e.ratio === 1 ? '1:1' : `1:${e.ratio}`;
          html += `<a class="tt-tag" href="${nd.data.ref}" target="_blank" style="border-color:${gc}40">${dest.code} ${ratioStr}</a>`;
        });
        html += `</div>`;
        html += `<a class="tt-src" href="${nd.data.ref}" target="_blank">📎 官方转点页面 ↗</a>`;
      } else {
        const dest = nd.data;
        const groups = currentMode === 'airlines' ? ALLIANCES : HOTEL_CHAINS;
        const gc = groups[dest.alliance]?.color || '#888';
        html += `<div class="tt-title" style="color:${gc}">${dest.name}</div>`;
        html += `<div class="tt-sub">${dest.alliance} · ${connected.length} 个积分计划可转入</div>`;
        html += `<div class="tt-partners">`;
        connected.forEach(e => {
          const card = CARD_PROGRAMS.find(c => c.id === e.from);
          if (!card) return;
          const ratioStr = e.ratio === 1 ? '1:1' : `1:${e.ratio}`;
          html += `<a class="tt-tag" href="${card.ref}" target="_blank" style="border-color:${card.color}40;color:${card.color}">${card.name} ${ratioStr}</a>`;
        });
        html += `</div>`;
        html += `<a class="tt-src" href="${PRIMARY_REF}" target="_blank">📎 US Credit Card Guide ↗</a>`;
      }

      tooltip.innerHTML = html;
      tooltip.classList.toggle('locked', !!lockedNode);
      tooltip.style.display = 'block';
      const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
      let tx = sx + 16, ty = sy - th/2;
      if (tx + tw > window.innerWidth - 20) tx = sx - tw - 16;
      if (ty < 10) ty = 10;
      if (ty + th > window.innerHeight - 10) ty = window.innerHeight - th - 10;
      tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px';
    }

    // ═══════════════════════════════════════════════════
    //  CAMERA CONTROLS
    // ═══════════════════════════════════════════════════

    function updateCamera() {
      const hw = W / (2 * zoomLevel), hh = H / (2 * zoomLevel);
      camera.left = -hw + panOffset.x; camera.right = hw + panOffset.x;
      camera.top = hh + panOffset.y; camera.bottom = -hh + panOffset.y;
      camera.updateProjectionMatrix();
    }

    renderer.domElement.addEventListener('wheel', e => {
      e.preventDefault();
      zoomLevel = Math.max(0.3, Math.min(3, zoomLevel * (e.deltaY > 0 ? 0.92 : 1.08)));
      updateCamera();
    }, { passive: false });

    renderer.domElement.addEventListener('mousedown', e => {
      if (e.button === 0) { isPanning = true; panStart = { x: e.clientX, y: e.clientY }; }
    });

    renderer.domElement.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / W) * 2 - 1;
      mouse.y = -(e.clientY / H) * 2 + 1;
      if (isPanning) {
        panOffset.x += (e.clientX - panStart.x) / zoomLevel;
        panOffset.y -= (e.clientY - panStart.y) / zoomLevel;
        panStart = { x: e.clientX, y: e.clientY };
        updateCamera(); return;
      }
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(Object.values(nodeMeshes));
      if (intersects.length > 0) {
        const foundId = Object.entries(nodeMeshes).find(([, m]) => m === intersects[0].object)?.[0];
        if (foundId && foundId !== hoveredNode) {
          hoveredNode = foundId;
          if (!lockedNode && !selectedAlliance) { highlightNode(foundId); showTooltip(foundId, e.clientX, e.clientY); }
        } else if (foundId && !lockedNode && !selectedAlliance) {
          showTooltip(foundId, e.clientX, e.clientY);
        }
        renderer.domElement.style.cursor = 'pointer';
      } else {
        if (hoveredNode && !lockedNode && !selectedAlliance) {
          hoveredNode = null; resetHighlight(); tooltip.style.display = 'none';
        }
        renderer.domElement.style.cursor = 'default';
      }
    });

    renderer.domElement.addEventListener('mouseup', () => { isPanning = false; });
    renderer.domElement.addEventListener('click', e => {
      if (hoveredNode) {
        if (selectedAlliance) { selectedAlliance = null; document.querySelectorAll('.legend-item.clickable').forEach(e => e.classList.remove('active')); }
        if (lockedNode === hoveredNode) { lockedNode = null; resetHighlight(); tooltip.style.display = 'none'; }
        else { lockedNode = hoveredNode; highlightNode(hoveredNode); showTooltip(hoveredNode, e.clientX, e.clientY); }
      } else if (lockedNode || selectedAlliance) { clearAllSelection(); }
    });

    // --- Touch events (mobile) ---
    let touchStartDist = 0, touchStartZoom = 1, isTouchPanning = false, touchPanStart = {x:0,y:0};

    renderer.domElement.addEventListener('touchstart', e => {
      e.preventDefault();
      if (e.touches.length === 1) {
        const t = e.touches[0];
        isTouchPanning = true;
        touchPanStart = { x: t.clientX, y: t.clientY };
        // Tap = hover + possible click
        mouse.x = (t.clientX / W) * 2 - 1;
        mouse.y = -(t.clientY / H) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(Object.values(nodeMeshes));
        if (intersects.length > 0) {
          const foundId = Object.entries(nodeMeshes).find(([, m]) => m === intersects[0].object)?.[0];
          if (foundId) {
            hoveredNode = foundId;
            if (selectedAlliance) { selectedAlliance = null; document.querySelectorAll('.legend-item.clickable').forEach(e => e.classList.remove('active')); }
            if (lockedNode === foundId) { lockedNode = null; resetHighlight(); tooltip.style.display = 'none'; }
            else { lockedNode = foundId; highlightNode(foundId); showTooltip(foundId, t.clientX, t.clientY); }
            isTouchPanning = false;
          }
        } else if (lockedNode || selectedAlliance) { clearAllSelection(); isTouchPanning = false; }
      } else if (e.touches.length === 2) {
        isTouchPanning = false;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchStartDist = Math.sqrt(dx*dx + dy*dy);
        touchStartZoom = zoomLevel;
      }
    }, { passive: false });

    renderer.domElement.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 1 && isTouchPanning) {
        const t = e.touches[0];
        panOffset.x -= (t.clientX - touchPanStart.x) / zoomLevel;
        panOffset.y += (t.clientY - touchPanStart.y) / zoomLevel;
        touchPanStart = { x: t.clientX, y: t.clientY };
        updateCamera();
      } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        zoomLevel = Math.max(0.3, Math.min(3, touchStartZoom * (dist / touchStartDist)));
        updateCamera();
      }
    }, { passive: false });

    renderer.domElement.addEventListener('touchend', () => { isTouchPanning = false; });

    // ═══════════════════════════════════════════════════
    //  ANIMATION
    // ═══════════════════════════════════════════════════

    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;

      if (particleSystem && particleGeo) {
        for (let i = 0; i < particleCount; i++) {
          particleProgress[i] += particleSpeeds[i];
          if (particleProgress[i] > 1) particleProgress[i] -= 1;
          const ei = particleEdgeIndex[i];
          if (ei >= currentTransfers.length) continue;
          const [fromId, toId] = currentTransfers[ei];
          const from = nodePositions[fromId], to = nodePositions[toId];
          if (!from || !to) continue;
          const t = particleProgress[i];
          const midX = (from.x + to.x) / 2, midY = (from.y + to.y) / 2;
          particlePositions[i*3]     = (1-t)*(1-t)*from.x + 2*(1-t)*t*midX + t*t*to.x;
          particlePositions[i*3 + 1] = (1-t)*(1-t)*from.y + 2*(1-t)*t*midY + t*t*to.y;
          particlePositions[i*3 + 2] = 0.5;
        }
        particleGeo.attributes.position.needsUpdate = true;
      }

      // Breathing glow on cards
      CARD_PROGRAMS.forEach((card, ci) => {
        const glow = glowMeshes[card.id];
        if (glow) {
          const base = (hoveredNode === card.id || lockedNode === card.id) ? 0.25 : 0.12;
          glow.material.opacity = base + Math.sin(time * 1.5 + ci) * 0.03;
          glow.scale.setScalar(1 + Math.sin(time * 1.2 + ci * 0.5) * 0.05);
        }
      });

      renderer.render(scene, camera);
    }

    // ═══════════════════════════════════════════════════
    //  MODE TOGGLE
    // ═══════════════════════════════════════════════════

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.mode === currentMode) return;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        panOffset = { x: 0, y: 0 }; zoomLevel = 1; updateCamera();
        buildGraph(btn.dataset.mode);
      });
    });

    // ═══════════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════════

    buildGraph('airlines');
    updateCamera();
    animate();

    setTimeout(() => document.getElementById('title-bar').classList.add('faded'), 3000);
    document.getElementById('title-bar').addEventListener('mouseenter', () => document.getElementById('title-bar').classList.remove('faded'));
    document.getElementById('title-bar').addEventListener('mouseleave', () => document.getElementById('title-bar').classList.add('faded'));

    window.addEventListener('resize', () => {
      W = window.innerWidth; H = window.innerHeight;
      renderer.setSize(W, H);
      camera.left = -W/2; camera.right = W/2; camera.top = H/2; camera.bottom = -H/2;
      panOffset = { x: 0, y: 0 }; zoomLevel = 1;
      updateCamera();
      buildGraph(currentMode);
    });

  </script>
</body>
</html>
